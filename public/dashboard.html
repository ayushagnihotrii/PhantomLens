<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Captures Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --border: #2a2a4a;
      --text: #e0e0f0; --muted: #8888aa; --accent: #00d4ff;
    }
    body { font-family: "Inter", system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
    h1 { text-align: center; margin-bottom: 2rem; color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; }
    .capture-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem; overflow: hidden;
    }
    .capture-card h3 { font-size: .85rem; color: var(--accent); margin-bottom: .5rem; word-break: break-all; }
    .meta { font-size: .75rem; color: var(--muted); line-height: 1.6; margin-bottom: .75rem; }
    .photos { display: flex; gap: .75rem; }
    .photos img { width: 48%; border-radius: 8px; object-fit: cover; aspect-ratio: 4/3; background: #000; }
    .photos .label { font-size: .65rem; text-align: center; color: var(--muted); margin-top: 4px; }
    .photo-col { flex: 1; }
    .empty { text-align: center; color: var(--muted); padding: 4rem 0; }
    .refresh-btn {
      display: block; margin: 0 auto 2rem; padding: .5rem 1.5rem;
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>📊 Captures Dashboard</h1>
  <button class="refresh-btn" onclick="load()">🔄 Refresh</button>
  <div id="grid" class="grid"></div>

  <script>
    async function load() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "<p class='empty'>Loading…</p>";

      try {
        const res = await fetch("/api/captures");
        const data = await res.json();

        if (!data.length) { grid.innerHTML = "<p class='empty'>No captures yet.</p>"; return; }

        grid.innerHTML = data.reverse().map(c => `
          <div class="capture-card">
            <h3>🆔 ${c.sessionId}</h3>
            <div class="meta">
              <strong>Time:</strong> ${new Date(c.timestamp).toLocaleString()}<br/>
              <strong>Browser:</strong> ${c.deviceInfo?.browser || "—"}<br/>
              <strong>OS:</strong> ${c.deviceInfo?.os || "—"}<br/>
              <strong>Device:</strong> ${c.deviceInfo?.device || "—"}<br/>
              <strong>IP:</strong> ${c.deviceInfo?.ip || "—"}
            </div>
            <div class="photos">
              ${photoHtml(c.files?.front, "Front")}
              ${photoHtml(c.files?.rear, "Rear")}
            </div>
          </div>
        `).join("");
      } catch (e) {
        grid.innerHTML = `<p class='empty'>Error: ${e.message}</p>`;
      }
    }

    function photoHtml(file, label) {
      if (!file) return `<div class="photo-col"><div class="label">${label}: N/A</div></div>`;
      const src = file.storage === "local" ? `/uploads/${file.fileName}` : "#";
      return `<div class="photo-col"><img src="${src}" alt="${label}" /><div class="label">${label}</div></div>`;
    }

    load();
  </script>
</body>
</html>
